<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — AuditPro</title>
  <link rel="stylesheet" href="css/styles.css">
  <style>
    body { background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .error-card { background: #161b22; border: 0.5px solid #30363d; border-radius: 12px; padding: 40px 32px; width: 100%; max-width: 420px; text-align: center; }
    .error-code { font-size: 64px; font-weight: 500; color: var(--accent); line-height: 1; margin-bottom: 12px; letter-spacing: -0.03em; }
    .error-title { font-size: 18px; font-weight: 500; color: #e6edf3; margin-bottom: 10px; }
    .error-desc  { font-size: 13px; color: #8b949e; line-height: 1.65; margin-bottom: 28px; }
    .error-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-home { background: var(--accent); color: #fff; border: none; border-radius: 6px; padding: 9px 20px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-home:hover { background: var(--accent-hover); }
    .btn-back { background: transparent; color: #8b949e; border: 0.5px solid #30363d; border-radius: 6px; padding: 9px 20px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: var(--font); text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-back:hover { background: #161b22; color: #e6edf3; }
    .error-icon { margin: 0 auto 20px; width: 48px; height: 48px; opacity: 0.25; }
  </style>
</head>
<body>
  <div class="error-card">
    <svg class="error-icon" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" stroke="#e6edf3" stroke-width="1.5"/>
      <path d="M24 14v12M24 32v2" stroke="#e6edf3" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <div class="error-code">404</div>
    <div class="error-title">Page not found</div>
    <div class="error-desc">The page you're looking for doesn't exist or has been moved. Double-check the URL or go back to the dashboard.</div>
    <div class="error-actions">
      <a href="./dashboard.html" class="btn-home">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><rect x="1" y="1" width="4.5" height="4.5" rx="1" stroke="currentColor" stroke-width="1.1"/><rect x="7.5" y="1" width="4.5" height="4.5" rx="1" stroke="currentColor" stroke-width="1.1"/><rect x="1" y="7.5" width="4.5" height="4.5" rx="1" stroke="currentColor" stroke-width="1.1"/><rect x="7.5" y="7.5" width="4.5" height="4.5" rx="1" stroke="currentColor" stroke-width="1.1"/></svg>
        Go to dashboard
      </a>
      <a href="javascript:history.back()" class="btn-back">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M8 2.5L4 6.5L8 10.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Go back
      </a>
    </div>
  </div>
</body>
</html>
